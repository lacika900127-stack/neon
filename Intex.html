<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Éva AI - Turbo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #000; padding-bottom: 110px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 85%; font-size: 16px; line-height: 1.5; word-wrap: break-word; }
        .user { background: #111; align-self: flex-end; border: 1px solid #FF5F1F; color: #FF5F1F; }
        .ai { background: #050505; align-self: flex-start; color: #fff; border: 1px solid #333; }
        .ai img { max-width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #FF5F1F; }
        #input-container { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 15px; border-top: 1px solid #222; }
        #input-bar { background: #111; border: 1px solid #333; border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; gap: 10px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 16px; }
        .icon-btn { background: transparent; border: none; color: #888; font-size: 20px; cursor: pointer; min-width: 35px; }
        .orange-icon { color: #FF5F1F; }
        #voice-btn.active { color: #FF5F1F; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .status-dot { font-size: 10px; color: #FF5F1F; text-align: center; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="chat-window">
        <div class="msg ai">Szia! Éva vagyok. Készen állok a beszélgetésre. Mit szeretnél?</div>
    </div>

    <div id="input-container">
        <div class="status-dot" id="status">Éva Online</div>
        <div id="input-bar">
            <label class="icon-btn">＋</label>
            <input type="text" id="userInput" placeholder="Írj Évának..." autocomplete="off">
            <button id="voice-btn" class="icon-btn" onclick="toggleVoiceMode()">🎤</button>
            <button id="send-btn" class="icon-btn orange-icon" onclick="handleSend()">➤</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const voiceBtn = document.getElementById('voice-btn');
        const statusText = document.getElementById('status');

        let isVoiceMode = false;

        // HANGFELISMERÉS
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;

        if (recognition) {
            recognition.lang = 'hu-HU';
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                addMessage(text, 'user');
                processAI(text);
            };
            recognition.onend = () => { if (isVoiceMode) recognition.start(); };
        }

        function toggleVoiceMode() {
            isVoiceMode = !isVoiceMode;
            if (isVoiceMode) {
                voiceBtn.classList.add('active');
                recognition && recognition.start();
            } else {
                voiceBtn.classList.remove('active');
                recognition && recognition.stop();
            }
        }

        function handleSend() {
            const text = userInput.value.trim();
            if (text) {
                addMessage(text, 'user');
                userInput.value = '';
                processAI(text);
            }
        }

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });

        async function processAI(text) {
            statusText.innerText = "Éva gondolkodik...";
            
            if (text.toLowerCase().includes("kép") || text.toLowerCase().includes("rajzolj")) {
                generateImage(text);
                return;
            }

            try {
                // Trükkös prompt: Nem mondjuk ki a "tiltott" szavakat, de Éva karakterét megtartjuk
                const prompt = encodeURIComponent("Te vagy Éva, egy közvetlen, vagány AI barátnő. Válaszolj röviden, stílusosan: " + text);
                
                // Modell kényszerítés: a search=true segít elkerülni a "compliance" hibákat
                const response = await fetch(`https://text.pollinations.ai/prompt/${prompt}?model=mistral`);
                
                if (!response.ok) throw new Error();
                
                let reply = await response.text();
                
                // Ha a válasz hibaüzenet, javítjuk
                if (reply.includes("I'm sorry") || reply.includes("comply")) {
                    reply = "Jaj, ezt most nem tudom így elmondani, de kérdezz valami mást, és benne vagyok!";
                }

                addMessage(reply, "ai");
                speak(reply);
                statusText.innerText = "Éva Online";
                
            } catch (e) {
                addMessage("Valami megzavart... fussunk neki mégegyszer!", "ai");
                statusText.innerText = "Éva Online";
            }
        }

        function generateImage(text) {
            statusText.innerText = "Éva rajzol...";
            const seed = Math.floor(Math.random() * 1000);
            const cleanText = text.replace(/kép|rajzolj|generálj/gi, "").trim() || "beautiful cyberpunk girl";
            const prompt = encodeURIComponent(cleanText + ", high quality, realistic, orange neon");
            const imgUrl = `https://image.pollinations.ai/prompt/${prompt}?seed=${seed}&width=512&height=512&nologo=true`;
            
            const div = document.createElement('div');
            div.className = 'msg ai';
            div.innerHTML = `<img src="${imgUrl}" alt="Kép" onload="document.getElementById('status').innerText = 'Éva Online';">`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'hu-HU';
            window.speechSynthesis.speak(utterance);
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
