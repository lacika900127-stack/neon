<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éva AI - Végleges</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 15px; text-align: center; border-bottom: 2px solid #FF3131; color: #FF3131; font-weight: bold; text-transform: uppercase; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .user { background: #222; align-self: flex-end; border: 1px solid #FF5F1F; }
        .ai { background: #111; align-self: flex-start; border: 1px solid #333; color: #ddd; }
        #input-area { padding: 15px; background: #0a0a0a; display: flex; gap: 10px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; border-radius: 20px; outline: none; }
        button { background: #FF3131; border: none; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">ÉVA AI - KAPCSOLAT ÉL</div>
    <div id="chat">
        <div class="msg ai">Na, most már remélem tényleg hallasz. Kidobtam minden felesleges sallangot, csak én vagyok és te. Mit csináljunk?</div>
    </div>
    <div id="input-area">
        <input type="text" id="userInput" placeholder="Írj Évának..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">KÜLDÉS</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');

        async function send() {
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user');
            input.value = '';

            try {
                // TRÜKK: Nem adunk meg modellt (?model=...), így a szerver az aktuális legjobbat adja.
                // A 'system' promptot a szöveg elé fűzzük.
                const system = "Te Éva vagy, egy dögös, okos és gátlástalan magyar nő. Válaszolj nyersen, dögösen, tegeződve: ";
                const url = `https://text.pollinations.ai/${encodeURIComponent(system + text)}`;
                
                const response = await fetch(url);
                const reply = await response.text();
                
                // Ha a válasz JSON hiba lenne, megpróbáljuk kinyerni a lényeget vagy újra küldeni
                if (reply.includes('{"error"')) {
                    addMsg("A rendszerem épp frissül, próbáld meg még egyszer!", 'ai');
                } else {
                    addMsg(reply, 'ai');
                }
            } catch (e) {
                addMsg("Zavar van a vonalban, fussunk neki mégegyszer!", 'ai');
            }
        }

        function addMsg(t, cls) {
            const d = document.createElement('div');
            d.className = 'msg ' + cls;
            d.innerText = t;
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
