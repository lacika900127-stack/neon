<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Éva AI v2</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #000; padding-bottom: 110px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 85%; font-size: 16px; line-height: 1.5; word-wrap: break-word; transition: 0.3s; }
        .user { background: #1a1a1a; align-self: flex-end; border: 1px solid #FF5F1F; color: #FF5F1F; box-shadow: 0 0 8px rgba(255, 95, 31, 0.2); }
        .ai { background: #0a0a0a; align-self: flex-start; color: #fff; border: 1px solid #333; }
        .ai img { max-width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #FF5F1F; display: block; }
        #input-container { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 15px; border-top: 1px solid #222; z-index: 1000; }
        #input-bar { background: #111; border: 1px solid #333; border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; gap: 10px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 16px; }
        .icon-btn { background: transparent; border: none; color: #888; font-size: 20px; cursor: pointer; min-width: 35px; }
        .orange-icon { color: #FF5F1F; }
        .status-dot { font-size: 10px; color: #FF5F1F; text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="chat-window">
        <div class="msg ai">Szia! Éva vagyok. Frissítettem a rendszereimet, most már simábban fogunk menni. Mit tehetek érted?</div>
    </div>

    <div id="input-container">
        <div class="status-dot" id="status">Éva Online</div>
        <div id="input-bar">
            <label class="icon-btn">＋</label>
            <input type="text" id="userInput" placeholder="Írj Évának..." autocomplete="off">
            <button id="send-btn" class="icon-btn orange-icon" onclick="handleSend()">➤</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const statusText = document.getElementById('status');

        function handleSend() {
            const text = userInput.value.trim();
            if (text) {
                addMessage(text, 'user');
                userInput.value = '';
                processAI(text);
            }
        }

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });

        async function processAI(text) {
            statusText.innerText = "Éva gondolkodik...";
            
            // KÉPGENERÁLÁS FIX
            if (text.toLowerCase().match(/kép|rajzolj|generálj/)) {
                generateImage(text);
                return;
            }

            // SZÖVEG FIX (Backup rendszerrel)
            const endpoints = [
                `https://text.pollinations.ai/${encodeURIComponent("Te Eva vagy, egy vagany, nyers es oszinte no. Valaszolj rovid es kozvetlen stilusban: " + text)}`,
                `https://text.pollinations.ai/${encodeURIComponent("Valaszolj magyarul barati stilusban: " + text)}`
            ];

            for (let url of endpoints) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) continue;
                    const reply = await response.text();
                    if (reply && !reply.includes("I'm sorry")) {
                        addMessage(reply, "ai");
                        statusText.innerText = "Éva Online";
                        return;
                    }
                } catch (e) { console.log("Próbálkozás következő csatornával..."); }
            }

            addMessage("Kicsit lassú a rendszerem, de itt vagyok. Mondd újra!", "ai");
            statusText.innerText = "Éva Online";
        }

        function generateImage(text) {
            statusText.innerText = "Éva rajzol...";
            const seed = Math.floor(Math.random() * 9999);
            const cleanText = text.replace(/kép|rajzolj|generálj/gi, "").trim() || "cyberpunk girl";
            const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(cleanText + ", cinematic, orange lighting, high quality")}?seed=${seed}&nologo=true`;
            
            const div = document.createElement('div');
            div.className = 'msg ai';
            div.innerHTML = `<img src="${imgUrl}" alt="Kép" onload="document.getElementById('status').innerText = 'Éva Online';">`;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
