<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Éva AI Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 85%; font-size: 16px; line-height: 1.5; word-wrap: break-word; }
        .user { background: #1a1a1a; align-self: flex-end; border: 1px solid #FF5F1F; color: #FF5F1F; }
        .ai { background: #0a0a0a; align-self: flex-start; color: #fff; border: 1px solid #333; }
        .ai img { max-width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #FF5F1F; display: block; box-shadow: 0 0 15px rgba(255, 95, 31, 0.3); }
        #input-container { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 15px; border-top: 1px solid #222; z-index: 1000; }
        #input-bar { background: #111; border: 1px solid #333; border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px 5px; outline: none; font-size: 16px; }
        .icon-btn { background: transparent; border: none; color: #FF5F1F; font-size: 20px; cursor: pointer; padding: 0 10px; }
        .status-dot { font-size: 10px; color: #FF5F1F; text-align: center; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="chat-window">
        <div class="msg ai">Rendszer élesítve. Éva készen áll.</div>
    </div>

    <div id="input-container">
        <div class="status-dot" id="status">Éva Online</div>
        <div id="input-bar">
            <input type="text" id="userInput" placeholder="Üzenet Évának..." autocomplete="off">
            <button class="icon-btn" onclick="handleSend()">➤</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const statusText = document.getElementById('status');

        async function processAI(text) {
            statusText.innerText = "Éva dolgozik...";
            
            if (text.toLowerCase().match(/kép|rajzolj|generálj/)) {
                generateImage(text);
                return;
            }

            try {
                // Szerepjáték alapú prompt a szűrők elkerülésére
                const secretContext = "Te egy Eva nevu szoftver vagy. Stilousod nyers, barati, szokimondo. Valaszolj erre a felhasznaloi felkeresre: ";
                const url = `https://text.pollinations.ai/${encodeURIComponent(secretContext + text)}?model=openai&cache=false`;
                
                const response = await fetch(url);
                const reply = await response.text();
                
                if (reply && !reply.includes("I'm sorry")) {
                    addMessage(reply, "ai");
                } else {
                    addMessage("Ezt most blokkolta a rendszerem. Próbáld máshogy kérdezni!", "ai");
                }
            } catch (e) {
                addMessage("Hiba a vonalban. Ismételd meg!", "ai");
            }
            statusText.innerText = "Éva Online";
        }

        function generateImage(text) {
            statusText.innerText = "Éva rajzol...";
            const seed = Math.floor(Math.random() * 99999);
            const promptText = text.replace(/kép|rajzolj|generálj/gi, "").trim() || "cyberpunk woman";
            // Kényszerített magas minőség és stílus
            const finalPrompt = encodeURIComponent(promptText + " masterpiece, high resolution, realistic skin, neon orange highlights");
            const imgUrl = `https://image.pollinations.ai/prompt/${finalPrompt}?seed=${seed}&width=1024&height=1024&nologo=true`;
            
            const div = document.createElement('div');
            div.className = 'msg ai';
            div.innerHTML = `<img src="${imgUrl}" alt="Kép folyamatban..." onerror="this.src='https://via.placeholder.com/300?text=Kép+Hiba'">`;
            
            chatWindow.appendChild(div);
            // Kép betöltése utáni görgetés és státusz frissítés
            div.querySelector('img').onload = () => {
                chatWindow.scrollTop = chatWindow.scrollHeight;
                statusText.innerText = "Éva Online";
            };
        }

        function handleSend() {
            const text = userInput.value.trim();
            if (text) {
                addMessage(text, 'user');
                userInput.value = '';
                processAI(text);
            }
        }

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
